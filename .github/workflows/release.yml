name: release
on:
  workflow_dispatch:
    inputs:
      changelog:
        required: true
        type: string
        description: changelog
      display_name:
        required: true
        type: string
        description: display name
      release_type:
        required: true
        type: choice
        description: release type
        options:
          - ALPHA
          - BETA
          - RELEASE
      dry_run:
        required: true
        type: choice
        description: dry run
        default: YES_DRYRUN
        options:
          - YES_DRYRUN
          - NO_DRYRUN

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v2
      - name: setup jdk 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: never
      - name: build
        run: ./gradlew clean build
      - name: upload to modrinth and curseforge
        run: ./gradlew publishMods
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_UPLOAD_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          OVERRIDE_CHANGELOG: ${{ inputs.changelog }}
          OVERRIDE_DISPLAY_NAME: ${{ inputs.display_name }}
          OVERRIDE_RELEASE_TYPE: ${{ inputs.release_type }}
          PUBLISH_DRY_RUN: ${{ inputs.dry_run }}
        continue-on-error: true
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
